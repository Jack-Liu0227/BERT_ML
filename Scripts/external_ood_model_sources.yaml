# External OOD result sources that should be merged into
# output/ood_summary_reports/Combined/data/all_model_families_ood_summary.csv
#
# Current use case:
# - fewshot-guided k5 No_analysis LLM runs
# - keep gpt-5.4 as a standalone model/legend entry
# - reserve a simple interface for future external models by adding
#   another item under `models`

sources:
  - type: fewshot_guided_no_analysis
    enabled: true
    family_name: "LLM"
    # Set EXTERNAL_OOD_ROOT to the external result directory before running
    # Scripts/batch_summarize_combined_ood_reports.py. If it is unset, this
    # optional source is skipped because the path will not exist.
    root_dir: "${EXTERNAL_OOD_ROOT}"
    default_provider: "kilig"

    # Map external result folders to the OOD method labels used in BERT_ML.
    # k5 folders are included here. RandomCV is copied into the same k5
    # staging root so the LLM RandomCV baseline is available to combined plots.
    method_map:
      strength_ood_random_cv_baseline_no_analysis: "RandomCV"
      strength_ood_extrapolation_no_analysis: "Extrapolation"
      strength_ood_loco_k5_no_analysis: "LOCO"
      strength_ood_sparse_x_cluster_k5_no_analysis: "SparseXcluster"
      strength_ood_sparse_x_single_k5_no_analysis: "SparseXsingle"
      strength_ood_sparse_y_cluster_k5_no_analysis: "SparseYcluster"
      strength_ood_sparse_y_single_k5_no_analysis: "SparseYsingle"

    # Map case-name prefixes to the task metadata expected by the summary pipeline.
    case_map:
      ti_uts:
        alloy_family: "Ti"
        dataset_name: "titanium"
        property: "UTS(MPa)"
      ti_el:
        alloy_family: "Ti"
        dataset_name: "titanium"
        property: "El(%)"
      al_uts:
        alloy_family: "Al"
        dataset_name: "aluminum"
        property: "UTS(MPa)"
      hea_ys:
        alloy_family: "HEA"
        dataset_name: "hea"
        property: "YS(MPa)"
      hea_uts:
        alloy_family: "HEA"
        dataset_name: "hea"
        property: "UTS(MPa)"
      hea_el:
        alloy_family: "HEA"
        dataset_name: "hea"
        property: "El(%)"
      steel_ys:
        alloy_family: "Steel"
        dataset_name: "steel"
        property: "YS(MPa)"
      steel_uts:
        alloy_family: "Steel"
        dataset_name: "steel"
        property: "UTS(MPa)"
      steel_el:
        alloy_family: "Steel"
        dataset_name: "steel"
        property: "El(%)"
      matbench_steel_ys:
        alloy_family: "Matbench Steel"
        dataset_name: "matbench_steels_ood"
        property: "yield strength"
        metric_property: "YS(MPa)"

    # Future models can be added here without changing Python code.
    models:
      - model_dir: "gpt-5.4"
        model_name: "gpt-5.4"
        display_label: "gpt-5.4"
        model_family: "LLM"
        provider: "kilig"
