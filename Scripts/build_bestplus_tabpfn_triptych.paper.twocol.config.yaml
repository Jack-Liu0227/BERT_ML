# Two-column paper preset.
# Target: full-width figure in a standard double-column paper.
# Layout:
#   - top row: summary bar chart spanning both columns
#   - bottom row: baseline heatmap + rank heatmap
#
# This preset is more aggressive about abbreviation and spacing than the
# generic paper config, specifically to avoid folded/overlapping text.

labels:
  method_aliases:
    Extrapolation: "Extra"
    LOCO: "LOCO"
    SparseXcluster: "SX\nclu"
    SparseXsingle: "SX\nsgl"
    SparseYcluster: "SY\nclu"
    SparseYsingle: "SY\nsgl"

  series_aliases:
    BERT-best: "BERT"
    Traditional-best: "Trad"
    TabPFN-2.5-Plus-Numeric: "TP-num"
    TabPFN-2.5-Plus-Text: "TP-text"
    gpt-5.4: "gpt-5.4"

  summary_xlabel: "OOD split"
  baseline_xlabel: "OOD split"
  rank_xlabel: "OOD split"
  summary_ylabel: "Mean trial MAE"
  baseline_ylabel: ""
  rank_ylabel: ""

display:
  summary_metric: "summary_test_mae"
  summary_std_metric: "summary_test_mae_std"
  baseline_metric: "summary_test_mae"
  baseline_reference_label: "Traditional-best"
  baseline_relative_mode: "improvement_pct"
  baseline_better_direction: "lower"
  baseline_colorbar_label: "Delta MAE vs Trad (%)"
  rank_metric: "summary_test_mae"
  rank_metric_direction: "asc"
  rank_std_metric: "summary_test_mae_std"
  rank_std_metric_direction: "asc"
  rank_tiebreak_metric: "summary_test_r2"
  rank_tiebreak_metric_direction: "desc"
  rank_colorbar_label: "Rank (1=best)"

panels:
  summary:
    enabled: true
  baseline:
    enabled: true
  rank:
    enabled: true

figure:
  context: "paper"
  font_scale: 0.82
  figsize: [7.25, 5.65]

  # Two-row mosaic for double-column layout.
  panel_layout:
    - ["summary", "summary"]
    - ["baseline", "rank"]
  panel_width_ratios:
    summary: 1.0
    baseline: 1.05
    rank: 0.95
  panel_height_ratios: [1.35, 1.0]
  wspace: 0.28
  hspace: 0.30

  # Summary panel.
  bar_width: 0.14
  bar_capsize: 1.8
  bar_edgecolor: "black"
  bar_linewidth: 0.45
  summary_zero_line: false
  summary_show_errorbars: true
  summary_show_legend: true
  summary_show_value_labels: false
  summary_ylim: null
  summary_xtick_rotation: 0

  # Legend compactness.
  legend_title: "Series"
  legend_loc: "upper center"
  legend_bbox_to_anchor: [0.5, 1.02]
  legend_ncol: 5
  legend_fontsize: 6.9
  legend_title_fontsize: 6.9
  legend_frameon: true

  # Heatmap appearance.
  heatmap_xtick_rotation: 0
  heatmap_ytick_rotation: 0
  heatmap_linewidths: 0.35
  linecolor: "white"
  heatmap_annot_fontsize: 6.7
  heatmap_annot_color: "black"

  baseline_annotation_fmt: ".1f"
  baseline_show_colorbar: true
  baseline_cbar_shrink: 0.88
  baseline_heatmap_cmap: "RdBu"
  baseline_heatmap_center: 0.0
  baseline_vmin: -120
  baseline_vmax: 20

  rank_annotation_fmt: ".0f"
  rank_show_colorbar: true
  rank_cmap: "Blues_r"
  rank_vmin: 1
  rank_vmax: 4

  # Fonts / titles.
  dpi: 450
  title_fontsize: 10.8
  panel_title_fontsize: 9.0
  axis_label_fontsize: 8.0
  tick_label_fontsize: 7.0
  show_suptitle: true
  suptitle_y: 0.992
  tight_layout_pad: 0.32

  summary_title: "Mean MAE"
  baseline_title: "Delta MAE vs Trad"
  rank_title: "Rank by mean MAE"

  save_facecolor: "white"
  save_transparent: false
  bbox_inches: "tight"

output:
  title_template: "{alloy_family} | {dataset_name} | {property}"
  formats:
    - png
    - pdf
